name: Docs Lint

on:
  pull_request:
    paths:
      - "**/*.md"
      - "docs/**"

concurrency:
  group: docs-lint-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  docs-lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Lint changed markdown files
        env:
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
        run: |
          set -euo pipefail

          git fetch origin "${{ github.event.pull_request.base.ref }}" --depth=1
          mapfile -t docs_files < <(git diff --name-only "$BASE_REF...HEAD" | rg '\.md$' || true)

          if [[ ${#docs_files[@]} -eq 0 ]]; then
            echo "No markdown files changed."
            exit 0
          fi

          echo "Checking ${#docs_files[@]} markdown files"
          printf '%s\n' "${docs_files[@]}"

          failed=0
          for file in "${docs_files[@]}"; do
            if rg -n --pcre2 '\t' "$file" >/dev/null; then
              echo "Tab characters found in $file"
              failed=1
            fi
            if rg -n --pcre2 ' +$' "$file" >/dev/null; then
              echo "Trailing whitespace found in $file"
              failed=1
            fi
          done

          if [[ "$failed" -ne 0 ]]; then
            echo "Docs lint failed."
            exit 1
          fi

          echo "Docs lint passed."
