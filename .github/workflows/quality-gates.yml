name: Quality Gates

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review

concurrency:
  group: quality-gates-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read
  actions: read

jobs:
  change-scope:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docs_only: ${{ steps.scope.outputs.docs_only }}
    steps:
      - name: Detect docs-only changes
        id: scope
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const pullNumber = context.payload.pull_request?.number;

            const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100,
            });

            const isDocsOnlyFile = (path) => path.endsWith(".md") || path.startsWith("docs/");
            const docsOnly =
              changedFiles.length > 0 && changedFiles.every((file) => isDocsOnlyFile(file.filename));

            core.info(`Changed files: ${changedFiles.length}`);
            core.info(`docs_only=${docsOnly}`);
            core.setOutput("docs_only", String(docsOnly));

  pr-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Enforce PR test policy
        uses: actions/github-script@v8
        with:
          script: |
            const body = context.payload.pull_request?.body ?? "";
            const pullNumber = context.payload.pull_request?.number;
            const owner = context.repo.owner;
            const repo = context.repo.repo;

            const hasTestsChecked = /-\s*\[[xX]\]\s*Added or updated automated tests for behavior changes\./.test(body);
            const hasNoTestNeededChecked = /-\s*\[[xX]\]\s*No test needed/i.test(body);

            if (hasTestsChecked && hasNoTestNeededChecked) {
              core.setFailed("Select only one test plan option: either tests were added/updated, or no-test-needed with rationale.");
              return;
            }

            if (!hasTestsChecked && !hasNoTestNeededChecked) {
              core.setFailed("Choose a test plan option in the PR template.");
              return;
            }

            const changedFiles = await github.paginate(github.rest.pulls.listFiles, {
              owner,
              repo,
              pull_number: pullNumber,
              per_page: 100,
            });

            const productionTsChanges = changedFiles.filter((file) =>
              /^(apps|packages)\/.+\/src\/.+\.ts$/.test(file.filename) && !/\.test\.ts$/.test(file.filename),
            );
            const testChanges = changedFiles.filter((file) => /\.test\.ts$/.test(file.filename));

            if (productionTsChanges.length > 0 && testChanges.length === 0 && !hasNoTestNeededChecked) {
              core.setFailed(
                "Behavior-level source files changed without test file updates. Add/update tests or check no-test-needed with rationale and test debt issue.",
              );
              return;
            }

            if (hasNoTestNeededChecked) {
              const reasonMatch = body.match(/- reason:\s*(.+)/i);
              const reason = reasonMatch?.[1]?.trim() ?? "";
              if (!reason) {
                core.setFailed("No-test-needed was selected, but reason is missing under Test Exception.");
                return;
              }

              const debtIssueLinked =
                /- test debt issue:\s*(#\d+|https:\/\/github\.com\/[^/\s]+\/[^/\s]+\/issues\/\d+)/i.test(body) ||
                /(?:#\d+|https:\/\/github\.com\/[^/\s]+\/[^/\s]+\/issues\/\d+)/i.test(body);
              if (!debtIssueLinked) {
                core.setFailed("No-test-needed requires a linked test debt issue (for example #123).");
                return;
              }
            }

            core.info(
              `PR test policy passed. sourceChanges=${productionTsChanges.length}, testChanges=${testChanges.length}, noTestNeeded=${hasNoTestNeededChecked}`,
            );

  ci-verify:
    needs: [change-scope, pr-policy]
    if: always() && needs.pr-policy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Skip ci:verify for docs-only change
        if: needs.change-scope.outputs.docs_only == 'true'
        run: echo "Skipping ci:verify for docs-only PR."

      - name: Check out repository
        if: needs.change-scope.outputs.docs_only != 'true'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        if: needs.change-scope.outputs.docs_only != 'true'
        uses: pnpm/action-setup@v5
        with:
          version: 10.0.0

      - name: Set up Node.js
        if: needs.change-scope.outputs.docs_only != 'true'
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 22

      - name: Install dependencies
        if: needs.change-scope.outputs.docs_only != 'true'
        run: pnpm install --frozen-lockfile

      - name: CI Verify
        if: needs.change-scope.outputs.docs_only != 'true'
        run: pnpm ci:verify

      - name: Diff coverage
        if: needs.change-scope.outputs.docs_only != 'true'
        env:
          DIFF_BASE_REF: origin/${{ github.event.pull_request.base.ref }}
          DIFF_COVERAGE_THRESHOLD: "85"
        run: pnpm coverage:diff

  dependency-audit:
    needs: [change-scope, pr-policy]
    if: always() && needs.pr-policy.result == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Skip dependency audit for docs-only change
        if: needs.change-scope.outputs.docs_only == 'true'
        run: echo "Skipping dependency audit for docs-only PR."

      - name: Check out repository
        if: needs.change-scope.outputs.docs_only != 'true'
        uses: actions/checkout@v6

      - name: Set up pnpm
        if: needs.change-scope.outputs.docs_only != 'true'
        uses: pnpm/action-setup@v5
        with:
          version: 10.0.0

      - name: Set up Node.js
        if: needs.change-scope.outputs.docs_only != 'true'
        uses: actions/setup-node@v6
        with:
          cache: pnpm
          node-version: 22

      - name: Install dependencies
        if: needs.change-scope.outputs.docs_only != 'true'
        run: pnpm install --frozen-lockfile

      - name: Audit production dependencies
        if: needs.change-scope.outputs.docs_only != 'true'
        run: pnpm audit --prod --audit-level high

      - name: Secret scan
        if: needs.change-scope.outputs.docs_only != 'true'
        run: pnpm security:secrets

  required-gate:
    needs: [pr-policy, ci-verify, dependency-audit]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Assert required checks passed
        run: |
          set -euo pipefail

          echo "pr-policy: ${{ needs.pr-policy.result }}"
          echo "ci-verify: ${{ needs.ci-verify.result }}"
          echo "dependency-audit: ${{ needs.dependency-audit.result }}"

          [[ "${{ needs.pr-policy.result }}" == "success" ]] || exit 1
          [[ "${{ needs.ci-verify.result }}" == "success" ]] || exit 1
          [[ "${{ needs.dependency-audit.result }}" == "success" ]] || exit 1

          echo "All required gate jobs passed."
